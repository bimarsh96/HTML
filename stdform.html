<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stddesign.css">
</head>
<body>
    <h1>Student Registration Form</h1><br/>

  <form action="/action_page.php">
    <label for="roll no:">Roll no:</label>
    <input type="number" id="roll no:" value="number"><br/><br/>


    <label for="fname">Student Name:</label>
   <input type="text" id="fname" name="first" value="First Name">
   <input type="text" id="sname" name="second" value="Last Name"><br/><br/>
   <label for="parent">Father's name:</label>
   <input type="text"><br/><br/>

    <label for="fname">Date of birth::</label>
        <input type="text" class="dob-day" placeholder="Day" maxlength="2" /> 
          <input type="text" class="dob-month" placeholder="Month" maxlength="2" />
        <input type="text" class="dob-year" placeholder="Year" maxlength="4" /><br/><br/>

       <label class="field-label">Mobile no. :</label>
     <input type="tel" class="phone-input" maxlength="10" />
   <br/><br/>

    <label for="email">Email id:</label>
    <input type="email" id="email" name="email" ><br/><br/>
    
    <label for="pass">Password:</label>
    <input type="password"><br/><br/>
    
    <label for="gender">Gender:</label>
    <input type="radio">Male
    <input type="radio">Female<br/><br/>

    <label for="depart">Department:</label>
    <input type="checkbox">CSE
    <input type="checkbox">IT
    <input type="checkbox">ECE
    <input type="checkbox">Civil
    <input type="checkbox">Mech<br/><br/>

    <label for="cours">Course:</label>
    <select id="courses" id="cours " value="-------Select Courses----- ">
   <option value="mba">MBA</option>
   <option value="csit">CSIT</option>
   <option value="civil">CIVIL</option>
   <option value="bca">BCA</option>
   <option value="bit">BIT</option>
   <option value="bba">BBA</option>
  </select>
   <BR/><BR/>

       <label for="image">Student photo :</label>
       <input type="file" accept="image/*" /><br/><br/>
     
    
    <label for="add">City:</label>
    <input type="text"><br/><br/>
    
     <label for="add">Address:</label>
    <input type="text"><br/><br/>

     
    <input type="submit">


</form>
</body>
</html>
